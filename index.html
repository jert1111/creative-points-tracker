        const csL=csRows.reduce((s,r)=>s+r.launched,0),csW=csRows.reduce((s,r)=>s+r.won,0);

        return <>
          <HitRateChart label="📊 Team Hit Rate by Month" rows={teamRows} totL={tL} totW={tW}/>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
            <HitRateChart label="✂️ Editors Hit Rate by Month" rows={editorRows} totL={edL} totW={edW}/>
            <HitRateChart label="✍️ Creative Strategists Hit Rate by Month" rows={csRows} totL={csL} totW={csW}/>
          </div>
        </>;
      })()}

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        {[{label:"✂️ Editors",names:editors,bc:"border-blue-200"},{label:"🎯 Creative Strategists",names:cs,bc:"border-purple-200"}].map(({label,names,bc})=><div key={label}>
          <p className="text-xs font-bold uppercase tracking-wide mb-3 text-gray-500">{label}</p>
          <div className="space-y-3">
            {names.slice().sort((a,b)=>calcPersonHitRate(filteredLaunched,filteredWinAds,b).rate-calcPersonHitRate(filteredLaunched,filteredWinAds,a).rate).map(name=>{
              const hr=calcPersonHitRate(filteredLaunched,filteredWinAds,name),pct=Math.round(hr.rate*100);
              return <div key={name} className={`bg-white rounded-xl border-2 ${bc} p-4`}>
                <div className="flex items-center justify-between mb-3">
                  <span className="font-bold text-gray-800">{name}</span>
                  <div className="text-right"><div className={`text-2xl font-bold ${hr.totalLaunched>0?rc(hr.rate):"text-gray-400"}`}>{hr.totalLaunched>0?`${pct}%`:"—"}</div><div className="text-xs text-gray-400">{hr.totalWon}/{hr.totalLaunched} concepts</div></div>
                </div>
                {hr.rows.length>0&&<div className="space-y-1.5">{hr.rows.map(r=><div key={r.month} className="flex items-center gap-2 text-xs">
                  <span className="text-gray-500 w-14 shrink-0">{r.month}</span>
                  <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${rb(r.rate)}`} style={{width:`${Math.round(r.rate*100)}%`}}/></div>
                  <span className="text-gray-500 w-20 text-right">{r.won}/{r.launched} <span className="font-semibold">{r.launched>0?`${Math.round(r.rate*100)}%`:"—"}</span></span>
                </div>)}</div>}
                {!hr.totalLaunched&&<div className="text-xs text-gray-400 italic mt-1">No ads attributed yet</div>}
              </div>;
            })}
          </div>
        </div>)}
      </div>

      {(()=>{
        const allWins=filteredWinAds.filter(a=>!a.blocked);
        const addManualWin=()=>{
          const nw={id:Date.now()+Math.random(),adName:"",member:teamNames[0],winType:"Editor 20-40s",attributions:[],week:impWeek,blocked:false,autoFlagged:false,_parsed:null,_manual:true};
          const next=[...winAds,nw];setWinAds(next);save(teamNames,weekData,next,launched,criteria);
        };
        const updateMember=(id,role,memberName)=>{
          const next=winAds.map(a=>{
            if(a.id!==id)return a;
            const u={...a};
            const wt=u.winType;
            const isEditor=wt==="Editor <20s"||wt==="Editor 20-40s";
            const csWT=wt==="Editor <20s"?"CS <20s":"CS 20-40s";
            const cur=u.attributions||[];
            if(wt==="Static"){
              u.attributions=memberName?[{member:memberName,winType:"Static",pts:WIN_PTS["Static"]}]:[];
            } else if(isEditor){
              const edMember=role==="editor"?memberName:(cur.find(at=>at.winType===wt)?.member||null);
              const csMember=role==="cs"?memberName:(cur.find(at=>at.winType===csWT)?.member||null);
              const res=[];
              if(edMember)res.push({member:edMember,winType:wt,pts:WIN_PTS[wt]});
              if(csMember){
                if(csMember===edMember&&res.length)res[0].pts+=WIN_PTS[csWT];
                else res.push({member:csMember,winType:csWT,pts:WIN_PTS[csWT]});
              }
              u.attributions=res;
            } else {
              u.attributions=memberName?[{member:memberName,winType:wt,pts:WIN_PTS[wt]}]:[];
            }
            return u;
          });
          setWinAds(next);save(teamNames,weekData,next,launched,criteria);
        };
        const getMember=(ad,role)=>{
          const wt=ad.winType;
          const csWT=wt==="Editor <20s"?"CS <20s":"CS 20-40s";
          const isEditor=wt==="Editor <20s"||wt==="Editor 20-40s";
          if(role==="editor"&&isEditor) return (ad.attributions||[]).find(at=>at.winType===wt)?.member||"";
          if(role==="cs"){
            if(isEditor) return (ad.attributions||[]).find(at=>at.winType===csWT)?.member||"";
            return (ad.attributions||[])[0]?.member||"";
          }
          return "";
        };
        const MemberSel=({adId,role,value,winType})=>{
          const isEditor=winType==="Editor <20s"||winType==="Editor 20-40s";
          const showEditor=role==="editor"&&isEditor;
          const showCS=role==="cs";
          if(!showEditor&&!showCS)return null;
          const color=role==="editor"?"border-blue-200 text-blue-700":"border-violet-200 text-violet-700";
          return(
            <select className={`border rounded px-1.5 py-0.5 text-xs ${color} bg-white`}
              value={value} onChange={e=>updateMember(adId,role,e.target.value||null)}>
              <option value="">— none —</option>
              {teamNames.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          );
        };
        return <div>
          <div className="flex items-center justify-between mb-3">
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">
              🏆 Winners ({allWins.length})
              <span className="font-normal normal-case text-gray-400 ml-2">Edit win type · Assign editor &amp; CS · Points update instantly</span>
            </p>
            <button onClick={addManualWin} className="flex items-center gap-1.5 bg-gray-800 hover:bg-gray-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors">+ Add winner</button>
          </div>
          <div className="overflow-x-auto rounded-xl border border-gray-200">
            <table className="w-full text-sm border-collapse">
              <thead>
                <tr className="bg-gray-800 text-white text-xs">
                  <th className="px-3 py-2 text-left min-w-[220px]">Ad Name</th>
                  <th className="px-3 py-2 text-left">Win Type</th>
                  <th className="px-3 py-2 text-left">✂️ Editor</th>
                  <th className="px-3 py-2 text-left">✍️ CS</th>
                  <th className="px-3 py-2 text-left">Points</th>
                  <th className="px-3 py-2 text-left">Month</th>
                  <th className="px-3 py-2 text-right">CPA</th>
                  <th className="px-2 py-2"></th>
                </tr>
              </thead>
              <tbody>
                {allWins.length===0&&<tr><td colSpan={8} className="px-4 py-8 text-center text-gray-400 text-sm italic">No winners yet — import performance data above or add manually</td></tr>}
                {allWins.map((ad,i)=>{
                  const wt=ad.winType;
                  const isEditor=wt==="Editor <20s"||wt==="Editor 20-40s";
                  const edVal=getMember(ad,"editor");
                  const csVal=getMember(ad,"cs");
                  const attrs=ad.attributions||[];
                  return <tr key={ad.id} className={i%2===0?"bg-white":"bg-gray-50"}>
                    <td className="px-3 py-2 text-xs max-w-xs">
                      {ad._manual
                        ?<input className="border rounded px-1.5 py-0.5 text-xs w-full" placeholder="Paste ad name…" value={ad.adName} onChange={e=>updateWin(ad.id,"adName",e.target.value)}/>
                        :<span className="text-gray-700 truncate block">{ad.adName}</span>}
                    </td>
                    <td className="px-3 py-2">
                      <select className="border rounded px-2 py-0.5 text-xs" value={wt} onChange={e=>updateWin(ad.id,"winType",e.target.value)}>
                        {WIN_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                      </select>
                    </td>
                    <td className="px-3 py-2">
                      {isEditor
                        ?<MemberSel adId={ad.id} role="editor" value={edVal} winType={wt}/>
                        :<span className="text-gray-300 text-xs">—</span>}
                    </td>
                    <td className="px-3 py-2">
                      <MemberSel adId={ad.id} role="cs" value={csVal} winType={wt}/>
                    </td>
                    <td className="px-3 py-2 text-xs">
                      {attrs.length
                        ?<div className="flex flex-wrap gap-1.5">{attrs.map((at,j)=><span key={j} className="flex items-center gap-0.5"><span className="text-gray-600 font-medium">{at.member?.split(" ")[0]}</span><span className="text-amber-600 font-bold">+{at.pts}</span></span>)}</div>
                        :<span className="text-gray-300 italic">—</span>}
                    </td>
                    <td className="px-3 py-2 text-xs">
                      {editingMonthId===ad.id
                        ?<input
                            autoFocus
                            className="border border-violet-300 rounded px-1.5 py-0.5 text-xs w-16 focus:outline-none focus:ring-1 focus:ring-violet-400"
                            value={monthDraft}
                            onChange={e=>setMonthDraft(e.target.value)}
                            onBlur={()=>commitMonth(ad.id)}
                            onKeyDown={e=>{if(e.key==="Enter")commitMonth(ad.id);if(e.key==="Escape")setEditingMonthId(null);}}
                          />
                        :<span
                            className="text-gray-500 cursor-pointer hover:text-violet-600 hover:underline decoration-dotted"
                            title="Click to edit month"
                            onClick={()=>{setMonthDraft(ad._parsed?.monthYear||"");setEditingMonthId(ad.id);}}
                          >{ad._parsed?.monthYear||<span className="italic text-gray-300">—</span>}</span>
                      }
                    </td>
                    <td className="px-3 py-2 text-right text-xs text-gray-500">{ad.cpa?`£${ad.cpa.toFixed(2)}`:"—"}</td>
                    <td className="px-2 py-2"><button onClick={()=>removeWin(ad.id)} className="text-red-300 hover:text-red-500 text-xs">✕</button></td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>;
      })()}
    </div>;
  };

  // Sheet 5: Insights
  const InsightsSheet=()=>{
    const [weighted,setWeighted]=useState(false);
    const valid=winAds.filter(a=>!a.blocked&&a._parsed);
    if(!valid.length)return <div className="flex flex-col items-center justify-center py-20 text-center"><div className="text-5xl mb-4">📊</div><h2 className="text-lg font-bold text-gray-700 mb-2">No insights yet</h2><p className="text-sm text-gray-400">Import performance data in Sheet 4 to get started.</p></div>;
    const actors=buildRanking(winAds,p=>p.actor,weighted),personas=buildRanking(winAds,p=>p.persona,weighted);
    const solutions=buildRanking(winAds,p=>p.solutions,weighted),mediums=buildRanking(winAds,p=>p.medium,weighted);
    const funnels=buildRanking(winAds,p=>p.funnel,weighted),assets=buildRanking(winAds,p=>p.assetType,weighted);
    const pSol=buildRanking(winAds,p=>p.persona&&p.solutions?`${p.persona} + ${p.solutions}`:null,weighted);
    const pMed=buildRanking(winAds,p=>p.persona&&p.medium?`${p.persona} + ${p.medium}`:null,weighted);
    const aPer=buildRanking(winAds,p=>p.actor&&p.persona?`${p.actor} + ${p.persona}`:null,weighted);
    const sMed=buildRanking(winAds,p=>p.solutions&&p.medium?`${p.solutions} + ${p.medium}`:null,weighted);
    const statics=valid.filter(a=>a._parsed.assetType==="static");
    const to=valid.filter(a=>["<20s","20-40s","+40s"].includes(a._parsed.assetType)&&a._parsed.medium?.toLowerCase().replace(/\s/g,"")==="textoverlay");
    const videos=valid.filter(a=>["<20s","20-40s","+40s"].includes(a._parsed.assetType)&&a._parsed.medium?.toLowerCase().replace(/\s/g,"")!=="textoverlay");
    const WL=({title,emoji,ads,color})=>{
      const [editingMonth,setEditingMonth]=useState(null);
      const [monthDraft,setMonthDraft]=useState("");
      const commitMonth=(ad)=>{
        const val=monthDraft.trim();
        setWinAds(prev=>{
          const next=prev.map(a=>a.id===ad.id?{
            ...a,
            monthYear:val||a._parsed?.monthYear||a.monthYear||"—",
            _parsed:{...(a._parsed||{}),monthYear:val||a._parsed?.monthYear||"—"}
          }:a);
          save(teamNames,weekData,next,launched,criteria);
          return next;
        });
        setEditingMonth(null);
      };
      return <div className="bg-white border rounded-xl overflow-hidden">
        <div className={`px-4 py-3 ${color} flex items-center justify-between`}><span className="font-bold text-sm">{emoji} {title}</span><span className="text-xs opacity-70">{ads.length} winner{ads.length!==1?"s":""}</span></div>
        {!ads.length
          ?<div className="px-4 py-6 text-center text-gray-400 text-sm italic">No winners yet</div>
          :<table className="w-full text-sm">
            <thead><tr className="bg-gray-50 text-xs text-gray-500"><th className="px-4 py-2 text-left">Ad Name</th><th className="px-4 py-2 text-left">Points to</th><th className="px-4 py-2 text-left">Month</th></tr></thead>
            <tbody>{ads.map((ad,i)=><tr key={ad.id} className={i%2===0?"bg-white":"bg-gray-50"}>
              <td className="px-4 py-2 font-medium text-gray-800 max-w-xs truncate">{ad.adName||<span className="italic text-gray-400">Unnamed</span>}</td>
              <td className="px-4 py-2 text-xs">{(ad.attributions||[]).length?<div className="flex flex-wrap gap-1">{ad.attributions.map((at,j)=><span key={j} className="text-amber-700 font-semibold">{at.member} +{at.pts}</span>)}</div>:<span className="text-gray-400">—</span>}</td>
              <td className="px-4 py-2 text-xs">
                {editingMonth===ad.id
                  ?<input
                      autoFocus
                      className="border border-violet-300 rounded px-1.5 py-0.5 text-xs w-20 focus:outline-none focus:ring-1 focus:ring-violet-400"
                      value={monthDraft}
                      onChange={e=>setMonthDraft(e.target.value)}
                      onBlur={()=>commitMonth(ad)}
                      onKeyDown={e=>{if(e.key==="Enter")commitMonth(ad);if(e.key==="Escape")setEditingMonth(null);}}
                    />
                  :<span
                      className="text-gray-400 cursor-pointer hover:text-violet-600 hover:underline decoration-dotted"
                      title="Click to edit month"
                      onClick={()=>{setMonthDraft(ad._parsed?.monthYear||"");setEditingMonth(ad.id);}}
                    >{ad._parsed?.monthYear||<span className="italic text-gray-300">—</span>}</span>
                }
              </td>
            </tr>)}</tbody>
          </table>
        }
      </div>;
    };
    return <div>
      <div className="flex items-center justify-between mb-6">
        <div><h2 className="font-bold text-gray-800">Winning Ads Insights</h2><p className="text-xs text-gray-400">{valid.length} winning ads</p></div>
        <div className="flex rounded-lg border overflow-hidden"><button onClick={()=>setWeighted(false)} className={`px-4 py-2 text-sm font-medium ${!weighted?"bg-gray-800 text-white":"bg-white text-gray-600"}`}>By Count</button><button onClick={()=>setWeighted(true)} className={`px-4 py-2 text-sm font-medium ${weighted?"bg-gray-800 text-white":"bg-white text-gray-600"}`}>By Points</button></div>
      </div>
      <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-3">Individual Elements</p>
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8"><InsightCard title="🎭 Actor" data={actors} weighted={weighted}/><InsightCard title="👤 Persona" data={personas} weighted={weighted}/><InsightCard title="💡 Solutions" data={solutions} weighted={weighted}/><InsightCard title="🎬 Medium" data={mediums} weighted={weighted}/><InsightCard title="🔽 Funnel" data={funnels} weighted={weighted}/><InsightCard title="📐 Asset Type" data={assets} weighted={weighted}/></div>
      <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-3">Combinations</p>
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8"><InsightCard title="👤💡 Persona + Solutions" data={pSol} weighted={weighted}/><InsightCard title="👤🎬 Persona + Medium" data={pMed} weighted={weighted}/><InsightCard title="🎭👤 Actor + Persona" data={aPer} weighted={weighted}/><InsightCard title="💡🎬 Solutions + Medium" data={sMed} weighted={weighted}/></div>
      <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-3">Winner Lists</p>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4"><WL title="Static Winners" emoji="🖼️" ads={statics} color="bg-purple-50 text-purple-900"/><WL title="Video Winners" emoji="🎬" ads={videos} color="bg-blue-50 text-blue-900"/><WL title="Text Overlay Winners" emoji="✍️" ads={to} color="bg-teal-50 text-teal-900"/></div>
    </div>;
  };

  // Sheet: Weekly Winners
  const WeeklyWinnersSheet=()=>{
    const winsByWeek=WEEKS.map((w,wi)=>{
      const winsThisWeek=winAds.filter(a=>a.week===w&&!a.blocked);
      const isStatic=a=>a.winType==="Static"||(a._parsed?.format&&["Graphic","Image","Carousel"].includes(a._parsed.format));
      const isShort=a=>a._parsed?.assetType==="<20s"||(a.winType?.includes("<20s"));
      const isMid=a=>a._parsed?.assetType==="20-40s"||(a.winType?.includes("20-40s"));
      const statics=winsThisWeek.filter(a=>isStatic(a)).length;
      const shortVids=winsThisWeek.filter(a=>!isStatic(a)&&isShort(a)).length;
      const midVids=winsThisWeek.filter(a=>!isStatic(a)&&isMid(a)).length;
      const longVids=winsThisWeek.filter(a=>!isStatic(a)&&!isShort(a)&&!isMid(a)).length;
      const total=winsThisWeek.length;
      return {week:w,wi,shortVids,midVids,longVids,statics,total,ads:winsThisWeek};
    });
    const [expandedWeek,setExpandedWeek]=useState(null);
    const maxTotal=Math.max(...winsByWeek.map(r=>r.total),1);
    const grandTotal=winsByWeek.reduce((s,r)=>s+r.total,0);
    const Cell=({n,color="text-gray-700"})=>n>0
      ?<td className={`px-3 py-3 text-center font-semibold text-sm ${color}`}>{n}</td>
      :<td className="px-3 py-3 text-center text-gray-200 text-sm">—</td>;
    return <div>
      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="font-bold text-gray-800 text-lg">Weekly Winners</h2>
          <p className="text-xs text-gray-400 mt-0.5">{grandTotal} total winning ads across the season · Click a week to see details</p>
        </div>
        <div className="flex items-center gap-2 bg-amber-50 border border-amber-200 rounded-xl px-4 py-2">
          <span className="text-amber-500 text-lg">🏆</span>
          <div><p className="text-xs text-amber-600 font-semibold uppercase tracking-wide">Season Total</p><p className="text-2xl font-bold text-amber-700 leading-none">{grandTotal}</p></div>
        </div>
      </div>
      <div className="mb-6 bg-gray-50 rounded-xl border border-gray-100 p-4">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Winners per week</p>
        <div className="flex items-end gap-1.5 h-16">
          {winsByWeek.map(({week,wi,total})=>{
            const h=maxTotal>0?Math.max(4,Math.round((total/maxTotal)*56)):4;
            const isActive=expandedWeek===wi;
            return <div key={wi} className="flex-1 flex flex-col items-center gap-1 cursor-pointer group" onClick={()=>setExpandedWeek(expandedWeek===wi?null:wi)}>
              <span className="text-xs font-bold text-amber-600 opacity-0 group-hover:opacity-100 transition-opacity">{total||""}</span>
              <div className="w-full rounded-t-md transition-all" style={{height:h,background:total===0?"#e5e7eb":isActive?"#d97706":"#f59e0b"}}/>
            </div>;
          })}
        </div>
        <div className="flex gap-1.5 mt-1">
          {WEEKS.map((w,i)=><div key={i} className="flex-1 text-center"><span className="text-[9px] text-gray-300 leading-none">{w.replace("w/c ","").replace("Pre ","")}</span></div>)}
        </div>
      </div>
      <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm mb-4">
        <table className="w-full text-sm border-collapse">
          <thead>
            <tr className="bg-gray-900 text-white">
              <th className="px-3 py-2.5 text-left min-w-[130px]">Week</th>
              <th colSpan={3} className="px-3 py-2.5 text-center border-l border-gray-700 text-blue-300">🎬 Videos</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-pink-300">🖼 Statics</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-amber-300">Total Wins</th>
            </tr>
            <tr className="bg-gray-800 text-gray-400 text-xs">
              <th className="px-3 py-1.5 text-left font-normal">Sprint</th>
              <th className="px-3 py-1.5 text-center border-l border-gray-700 font-normal">&lt;20s</th>
              <th className="px-3 py-1.5 text-center font-normal">20–40s</th>
              <th className="px-3 py-1.5 text-center font-normal">40s+</th>
              <th className="px-3 py-1.5 text-center border-l border-gray-700 font-normal">All</th>
              <th className="px-3 py-1.5 text-center border-l border-gray-700 font-normal text-amber-400">Ads</th>
            </tr>
          </thead>
          <tbody>
            {winsByWeek.map(({week,wi,shortVids,midVids,longVids,statics,total,ads},i)=>{
              const isExpanded=expandedWeek===wi;
              const rowBg=i%2===0?"bg-white":"bg-gray-50";
              return <>
                <tr key={wi} className={`${rowBg} cursor-pointer hover:bg-amber-50 transition-colors`} onClick={()=>setExpandedWeek(isExpanded?null:wi)}>
                  <td className="px-3 py-3 font-medium text-gray-800">
                    <div className="flex items-center gap-2">
                      <span className={`text-xs transition-transform ${isExpanded?"rotate-90":""}`}>▶</span>
                      {week}
                    </div>
                  </td>
                  <Cell n={shortVids} color="text-blue-500"/>
                  <Cell n={midVids} color="text-blue-600"/>
                  <Cell n={longVids} color="text-blue-700"/>
                  <Cell n={statics} color="text-pink-600"/>
                  <td className={`px-3 py-3 text-center font-bold text-sm border-l border-gray-100 ${total>0?"text-amber-600 bg-amber-50":""}`}>{total||<span className="text-gray-200">—</span>}</td>
                </tr>
                {isExpanded&&<tr key={`exp-${wi}`} className="bg-amber-50/50">
                  <td colSpan={6} className="px-4 py-3">
                    {ads.length===0
                      ?<p className="text-sm text-gray-400 italic">No winners logged for this week yet.</p>
                      :<div className="space-y-1.5">
                        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Winning ads — {week}</p>
                        {ads.map((ad,j)=>{
                          const isStaticAd=ad.winType==="Static"||(ad._parsed?.format&&["Graphic","Image","Carousel"].includes(ad._parsed?.format));
                          return <div key={ad.id} className="flex items-center gap-3 bg-white rounded-lg px-3 py-2 border border-amber-100">
                            <span className="text-sm">{isStaticAd?"🖼️":"🎬"}</span>
                            <span className="text-sm font-medium text-gray-800 truncate flex-1">{ad.adName||<span className="italic text-gray-400">Unnamed</span>}</span>
                            <span className="text-xs text-gray-400 shrink-0">{ad._parsed?.assetType||ad.winType}</span>
                            {(ad.attributions||[]).map((at,k)=><span key={k} className="text-xs bg-amber-100 text-amber-700 font-semibold px-2 py-0.5 rounded-full shrink-0">{at.member} +{at.pts}</span>)}
                          </div>;
                        })}
                      </div>
                    }
                  </td>
                </tr>}
              </>;
            })}
            <tr className="bg-gray-100 font-bold border-t-2 border-gray-300">
              <td className="px-3 py-3 text-gray-700">Season Total</td>
              {[
                winsByWeek.reduce((s,r)=>s+r.shortVids,0),
                winsByWeek.reduce((s,r)=>s+r.midVids,0),
                winsByWeek.reduce((s,r)=>s+r.longVids,0),
                winsByWeek.reduce((s,r)=>s+r.statics,0),
              ].map((n,i)=><td key={i} className={`px-3 py-3 text-center text-sm ${i===0?"border-l border-gray-200":""} ${n>0?"text-gray-800":"text-gray-300"}`}>{n||"—"}</td>)}
              <td className="px-3 py-3 text-center text-amber-700 text-lg border-l border-gray-200">{grandTotal}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p className="text-xs text-gray-400 italic">Winners are auto-detected via Performance Import or manually logged in Settings. Blocked ads are excluded.</p>
    </div>;
  };

  // Sheet: Weekly Output — FIXED to include CS statics
  const WeeklyOutputSheet=()=>{
    const editors=teamNames.map((n,mi)=>({name:n,mi})).filter(({name})=>!CS_NAMES.includes(name));
    const strats=teamNames.map((n,mi)=>({name:n,mi})).filter(({name})=>CS_NAMES.includes(name));
    const allMembers=[...editors,...strats];

    const weekSummaries=WEEKS.map((w,wi)=>{
      let totalVideos=0,totalStatics=0,totalScripts=0;
      // Editors: videos + statics
      editors.forEach(({mi})=>{
        const row=weekData[wi][mi]||emptyInput();
        if(row.sick||row.leave)return;
        totalVideos+=(row.v_sub20||0)+(row.v_2040||0)+(row.v_40p||0);
        totalStatics+=(row.static_count||0);
      });
      // CS: scripts + statics (fix: was missing statics from CS)
      strats.forEach(({mi})=>{
        const row=weekData[wi][mi]||emptyInput();
        if(row.sick||row.leave)return;
        totalScripts+=(row.s_sub20||0)+(row.s_2040||0)+(row.s_40p||0);
        totalStatics+=(row.static_count||0); // ← the fix
      });
      return {week:w,wi,totalVideos,totalStatics,totalScripts,total:totalVideos+totalStatics+totalScripts};
    });

    const [showPerPerson,setShowPerPerson]=useState(null);
    const maxVid=Math.max(...weekSummaries.map(r=>r.totalVideos),1);
    const maxStat=Math.max(...weekSummaries.map(r=>r.totalStatics),1);
    const maxScript=Math.max(...weekSummaries.map(r=>r.totalScripts),1);
    const seasonVids=weekSummaries.reduce((s,r)=>s+r.totalVideos,0);
    const seasonStats=weekSummaries.reduce((s,r)=>s+r.totalStatics,0);
    const seasonScripts=weekSummaries.reduce((s,r)=>s+r.totalScripts,0);

    return <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <h2 className="font-bold text-gray-800 text-lg">Weekly Output</h2>
          <p className="text-xs text-gray-400 mt-0.5">Whole team · Sick/leave weeks excluded · Click a week to see per-person detail</p>
        </div>
        <div className="flex gap-3 flex-wrap">
          <div className="flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-xl px-4 py-2">
            <span className="text-lg">🎬</span>
            <div><p className="text-xs text-blue-600 font-semibold uppercase tracking-wide">Season Videos</p><p className="text-2xl font-bold text-blue-700 leading-none">{seasonVids}</p></div>
          </div>
          <div className="flex items-center gap-2 bg-pink-50 border border-pink-200 rounded-xl px-4 py-2">
            <span className="text-lg">🖼️</span>
            <div><p className="text-xs text-pink-600 font-semibold uppercase tracking-wide">Season Statics</p><p className="text-2xl font-bold text-pink-700 leading-none">{seasonStats}</p></div>
          </div>
          <div className="flex items-center gap-2 bg-violet-50 border border-violet-200 rounded-xl px-4 py-2">
            <span className="text-lg">✍️</span>
            <div><p className="text-xs text-violet-600 font-semibold uppercase tracking-wide">Season Scripts</p><p className="text-2xl font-bold text-violet-700 leading-none">{seasonScripts}</p></div>
          </div>
        </div>
      </div>

      <div className="mb-6 bg-gray-50 rounded-xl border border-gray-100 p-4">
        <div className="flex gap-4 mb-3">
          <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-blue-400"/><span className="text-xs text-gray-500">Videos (edited)</span></div>
          <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-pink-400"/><span className="text-xs text-gray-500">Statics (all team)</span></div>
          <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-violet-400"/><span className="text-xs text-gray-500">Scripts (CS)</span></div>
        </div>
        <div className="flex items-end gap-2 h-24">
          {weekSummaries.map(({wi,totalVideos,totalStatics,totalScripts})=>{
            const vH=maxVid>0?Math.max(totalVideos>0?4:0,Math.round((totalVideos/maxVid)*80)):0;
            const sH=maxStat>0?Math.max(totalStatics>0?4:0,Math.round((totalStatics/maxStat)*80)):0;
            const scH=maxScript>0?Math.max(totalScripts>0?4:0,Math.round((totalScripts/maxScript)*80)):0;
            return <div key={wi} className="flex-1 flex items-end gap-px cursor-pointer group" onClick={()=>setShowPerPerson(showPerPerson===wi?null:wi)}>
              <div className="flex-1 rounded-t-sm bg-blue-400 hover:bg-blue-500 transition-colors" style={{height:vH}} title={`${totalVideos} videos`}/>
              <div className="flex-1 rounded-t-sm bg-pink-400 hover:bg-pink-500 transition-colors" style={{height:sH}} title={`${totalStatics} statics`}/>
              <div className="flex-1 rounded-t-sm bg-violet-400 hover:bg-violet-500 transition-colors" style={{height:scH}} title={`${totalScripts} scripts`}/>
            </div>;
          })}
        </div>
        <div className="flex gap-2 mt-1">
          {WEEKS.map((w,i)=><div key={i} className="flex-1 text-center"><span className="text-[9px] text-gray-300">{w.replace("w/c ","").replace("Pre ","")}</span></div>)}
        </div>
      </div>

      <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm mb-4">
        <table className="w-full text-sm border-collapse">
          <thead>
            <tr className="bg-gray-900 text-white">
              <th className="px-3 py-2.5 text-left min-w-[130px]">Week</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-blue-300">🎬 Videos</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-pink-300">🖼 Statics</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-violet-300">✍️ Scripts</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-emerald-300">Total</th>
            </tr>
          </thead>
          <tbody>
            {weekSummaries.map(({week,wi,totalVideos,totalStatics,totalScripts,total},i)=>{
              const rowBg=i%2===0?"bg-white":"bg-gray-50";
              const isExpanded=showPerPerson===wi;
              return <>
                <tr key={wi} className={`${rowBg} cursor-pointer hover:bg-blue-50/40 transition-colors`} onClick={()=>setShowPerPerson(isExpanded?null:wi)}>
                  <td className="px-3 py-3 font-medium text-gray-800">
                    <div className="flex items-center gap-2">
                      <span className={`text-xs transition-transform ${isExpanded?"rotate-90":""}`}>▶</span>
                      {week}
                    </div>
                  </td>
                  <td className={`px-3 py-3 text-center font-semibold border-l border-gray-100 ${totalVideos>0?"text-blue-600":"text-gray-200"}`}>{totalVideos||"—"}</td>
                  <td className={`px-3 py-3 text-center font-semibold border-l border-gray-100 ${totalStatics>0?"text-pink-600":"text-gray-200"}`}>{totalStatics||"—"}</td>
                  <td className={`px-3 py-3 text-center font-semibold border-l border-gray-100 ${totalScripts>0?"text-violet-600":"text-gray-200"}`}>{totalScripts||"—"}</td>
                  <td className={`px-3 py-3 text-center font-bold border-l border-gray-100 ${total>0?"text-emerald-700 bg-emerald-50":""}`}>{total||<span className="text-gray-200">—</span>}</td>
                </tr>
                {isExpanded&&<tr key={`pp-${wi}`} className="bg-blue-50/30">
                  <td colSpan={5} className="px-4 py-3">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <p className="text-xs font-semibold text-blue-500 uppercase tracking-wide mb-2">✂️ Editors</p>
                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-2">
                          {editors.map(({name,mi})=>{
                            const row=weekData[wi][mi]||emptyInput();
                            const vids=(row.v_sub20||0)+(row.v_2040||0)+(row.v_40p||0);
                            const stats=row.static_count||0;
                            const absent=row.sick||row.leave;
                            return <div key={mi} className={`bg-white rounded-lg px-3 py-2 border ${absent?"border-gray-100 opacity-40":"border-blue-100"}`}>
                              <p className="text-xs font-semibold text-gray-700 mb-1 truncate">{name}</p>
                              {absent?<p className="text-xs text-gray-400 italic">{row.sick?"Sick":"Leave"}</p>
                                :<div className="flex gap-2 text-xs">
                                  <span className="text-blue-600 font-bold">{vids}v</span>
                                  <span className="text-gray-300">·</span>
                                  <span className="text-pink-600 font-bold">{stats}s</span>
                                </div>}
                            </div>;
                          })}
                        </div>
                      </div>
                      <div>
                        <p className="text-xs font-semibold text-violet-500 uppercase tracking-wide mb-2">✍️ Strategists</p>
                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-2">
                          {strats.map(({name,mi})=>{
                            const row=weekData[wi][mi]||emptyInput();
                            const scripts=(row.s_sub20||0)+(row.s_2040||0)+(row.s_40p||0);
                            const stats=row.static_count||0;
                            const absent=row.sick||row.leave;
                            return <div key={mi} className={`bg-white rounded-lg px-3 py-2 border ${absent?"border-gray-100 opacity-40":"border-violet-100"}`}>
                              <p className="text-xs font-semibold text-gray-700 mb-1 truncate">{name}</p>
                              {absent?<p className="text-xs text-gray-400 italic">{row.sick?"Sick":"Leave"}</p>
                                :<div className="flex gap-2 text-xs flex-wrap">
                                  <span className="text-violet-600 font-bold">{scripts} script{scripts!==1?"s":""}</span>
                                  {stats>0&&<><span className="text-gray-300">·</span><span className="text-pink-600 font-bold">{stats}s</span></>}
                                </div>}
                            </div>;
                          })}
                        </div>
                      </div>
                    </div>
                  </td>
                </tr>}
              </>;
            })}
            <tr className="bg-gray-100 font-bold border-t-2 border-gray-300">
              <td className="px-3 py-3 text-gray-700">Season Total</td>
              <td className="px-3 py-3 text-center text-blue-700 border-l border-gray-200">{seasonVids}</td>
              <td className="px-3 py-3 text-center text-pink-700 border-l border-gray-200">{seasonStats}</td>
              <td className="px-3 py-3 text-center text-violet-700 border-l border-gray-200">{seasonScripts}</td>
              <td className="px-3 py-3 text-center text-emerald-700 font-bold border-l border-gray-200">{seasonVids+seasonStats+seasonScripts}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p className="text-xs text-gray-400 italic">Videos = edited by editors. Statics = all team (editors + CS). Scripts = CS scripting output. Sick/leave weeks excluded.</p>
    </div>;
  };

  return <div className="min-h-screen p-4" style={{background:"linear-gradient(135deg,#f0f4ff 0%,#faf5ff 50%,#f0fdf4 100%)"}}>
    <div className="max-w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
      <div className="px-6 py-5 flex items-center justify-between" style={{background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#1e3a5f 100%)"}}>
        <div>
          <div className="flex items-center gap-2 mb-0.5">
            <span className="text-2xl">🎬</span>
            <h1 className="text-white text-xl font-bold tracking-tight">Creative Team Tracker</h1>
          </div>
          <p className="text-indigo-300 text-xs">Simmer Eats · Updated each Monday</p>
        </div>
        <div className="flex items-center gap-3">
          {undoStack.length>0
            ?<button onClick={handleUndo} className="text-xs bg-amber-400/20 hover:bg-amber-400/30 text-amber-200 font-semibold px-3 py-1.5 rounded-full border border-amber-400/30 transition-all flex items-center gap-1.5">↩ Undo <span className="opacity-70 font-normal truncate max-w-[140px]">{undoStack[0].label}</span></button>
            :<span className="text-xs text-white/20 font-semibold px-3 py-1.5 rounded-full border border-white/10">↩ Undo</span>}
          {saveStatus==="error"
            ?<div className="relative">
               <button onClick={()=>setSave("saved")} className="text-xs px-3 py-1.5 rounded-full font-semibold border cursor-pointer" style={{background:"rgba(239,68,68,0.2)",color:"#fca5a5",borderColor:"rgba(239,68,68,0.4)"}}>⚠ Save Error — click to dismiss</button>
               {saveError&&<div className="absolute right-0 top-8 z-50 bg-gray-900 text-red-300 text-xs rounded-xl px-4 py-3 w-80 shadow-2xl border border-red-500/30">
                 <p className="font-bold mb-1 text-red-400">Save failed:</p>
                 <p className="font-mono break-words">{saveError}</p>
                 <p className="text-gray-400 mt-2">This usually means the storage limit was exceeded. Data is safe in memory but not persisted.</p>
               </div>}
             </div>
            :<div className="text-xs px-3 py-1.5 rounded-full font-semibold border" style={{background:saveStatus==="saved"?"rgba(16,185,129,0.15)":"rgba(245,158,11,0.15)",color:saveStatus==="saved"?"#6ee7b7":"#fcd34d",borderColor:saveStatus==="saved"?"rgba(16,185,129,0.3)":"rgba(245,158,11,0.3)"}}>{saveStatus==="saved"?"✓ Saved":"Saving…"}</div>
          }
          <button onClick={()=>{
            try{
              const seenE=new Set();
              const dl=launched.filter(a=>{const k=`${a.adName?.trim()}||${a.week}`;if(seenE.has(k))return false;seenE.add(k);return true;});
              const payload=JSON.stringify({_version:1,_exported:new Date().toISOString(),teamNames,weekData,winAds:winAds.map(({_parsed,_mWT,_mM,autoFlagged,attributions,...rest})=>({...rest,attributions})),launched:dl.map(({_parsed,_mWT,_mM,...rest})=>({id:rest.id,adName:rest.adName,week:rest.week,cpa:rest.cpa,spend:rest.spend})),criteria},null,2);
              const a=document.createElement("a");
              a.href=URL.createObjectURL(new Blob([payload],{type:"application/json"}));
              a.download=`simmer-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
              a.click();
            }catch(e){alert("Export failed: "+e.message);}
          }} className="text-xs bg-emerald-500 hover:bg-emerald-400 text-white font-semibold px-3 py-1.5 rounded-full border border-emerald-400/50 transition-all">⬇ Export JSON</button>
          <button onClick={()=>setExport(true)} className="text-xs bg-white/10 hover:bg-white/20 text-white font-semibold px-3 py-1.5 rounded-full border border-white/20 transition-all">💾 Backup & Restore</button>
        </div>
      </div>

      {showExport&&<div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl">
          <div className="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
            <div>
              <h2 className="font-bold text-gray-800 text-lg">Backup & Restore</h2>
              <p className="text-xs text-gray-400 mt-0.5">Save your full tracker data or restore from a previous backup</p>
            </div>
            <button onClick={()=>setExport(false)} className="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
          </div>
          <div className="flex border-b border-gray-100">
            {[["backup","💾 Backup (JSON)"],["csv","📊 Points (CSV)"],["restore","⬆ Restore"]].map(([id,label])=>
              <button key={id} onClick={()=>setExportTab(id)} className={`px-5 py-2.5 text-sm font-semibold border-b-2 transition-all ${exportTab===id?"border-violet-600 text-violet-700":"border-transparent text-gray-500 hover:text-gray-700"}`}>{label}</button>)}
          </div>
          <div className="p-6">
            {exportTab==="restore"
              ?<div>
                <p className="text-sm text-gray-600 mb-3">Upload a backup JSON file to restore. <span className="text-amber-600 font-semibold">This will overwrite your current data.</span></p>
                <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-violet-300 rounded-xl cursor-pointer bg-violet-50 hover:bg-violet-100 transition-colors">
                  <span className="text-2xl mb-1">📂</span>
                  <span className="text-sm font-semibold text-violet-700">Click to select backup JSON file</span>
                  <span className="text-xs text-gray-400 mt-0.5">simmer-tracker-backup-*.json</span>
                  <input type="file" accept=".json,application/json" className="hidden" onChange={e=>{
                    const file=e.target.files?.[0];
                    if(!file)return;
                    const reader=new FileReader();
                    reader.onload=ev=>setRestoreText(ev.target.result||"");
                    reader.readAsText(file);
                    e.target.value="";
                  }}/>
                </label>
                {restoreText&&<p className="text-violet-600 text-xs mt-2 font-semibold">✓ File loaded — click Restore to apply</p>}
                {restoreError&&<p className="text-red-500 text-xs mt-2 font-medium">⚠ {restoreError}</p>}
                {restoreOk&&<p className="text-green-600 text-xs mt-2 font-semibold">✓ Restored successfully</p>}
                <div className="flex gap-2 mt-3">
                  <button onClick={()=>{
                    setRestoreError("");setRestoreOk(false);
                    try{
                      const d=JSON.parse(restoreText.trim());
                      if(!d.teamNames||!d.weekData)throw new Error("Missing teamNames or weekData — is this a valid backup?");
                      pushUndo("Before restore",weekData,winAds);
                      // Capture all processed data into variables first so setState and save() use identical data
                      const restoredNames=d.teamNames||teamNames;
                      const restoredWeekData=d.weekData
                        ? decompressWeekData(d.weekData).map(w=>w.length<TEAM_SIZE?[...w,...Array(TEAM_SIZE-w.length).fill(null).map(emptyInput)]:w.slice(0,TEAM_SIZE))
                            .concat(Array(Math.max(0,13-d.weekData.length)).fill(null).map(()=>Array(TEAM_SIZE).fill(null).map(emptyInput)))
                        : weekData;
                      const restoredWinAds=d.winAds
                        ? d.winAds.map(a=>{const p=parseAdName(a.adName);return{...a,_parsed:p,attributions:a.attributions?.length?a.attributions:p?getWinAttributions(p,a.winType,restoredNames):[]};})
                        : winAds;
                      const restoredLaunchedRaw=d.launched||launched;
                      const seenL=new Set();
                      const restoredLaunched=restoredLaunchedRaw.filter(a=>{const k=`${a.adName?.trim()}||${a.week}`;if(seenL.has(k))return false;seenL.add(k);return true;}).map(a=>({...a,_parsed:parseAdName(a.adName)}));
                      const restoredCriteria=d.criteria||criteria;
                      setTeamNames(restoredNames);
                      setWeekData(restoredWeekData);
                      setWinAds(restoredWinAds);
                      setLaunched(restoredLaunched);
                      setCriteria(restoredCriteria);
                      // Write directly to storage — bypass debounce so re-renders can't overwrite pendingSaveRef
                      setSave("saving");
                      (async()=>{
                        let step="init",p1="",p2="";
                        try{
                          step="building winsClean";
                          const winsClean=restoredWinAds.map(({_parsed,_mWT,_mM,autoFlagged,attributions,...rest})=>({...rest,attributions,monthYear:_parsed?.monthYear||rest.monthYear||null}));
                          step="building launchClean";
                          const launchClean=restoredLaunched.map(({_parsed,...rest})=>({id:rest.id,adName:rest.adName,week:rest.week,cpa:rest.cpa,spend:rest.spend}));
                          step="stringifying main";
                          p1=JSON.stringify({teamNames:restoredNames,weekData:compressWeekData(restoredWeekData),winAds:winsClean,criteria:restoredCriteria});
                          step="stringifying launched";
                          p2=JSON.stringify(launchClean);
                          step=`writing main (${Math.round(p1.length/1024)}KB)`;
                          console.log(`Restore — main:${Math.round(p1.length/1024)}KB launched:${Math.round(p2.length/1024)}KB (${launchClean.length} ads)`);
                          const rRes=await fetch(`${SUPABASE_URL}/rest/v1/tracker_data`,{
                            method:"POST",
                            headers:{
                              "apikey":SUPABASE_KEY,
                              "Authorization":"Bearer "+SUPABASE_KEY,
                              "Content-Type":"application/json",
                              "Prefer":"resolution=merge-duplicates"
                            },
                            body:JSON.stringify({id:"main",payload:JSON.parse(p1),launched:JSON.parse(p2),updated_at:new Date().toISOString()})
                          });
                          if(!rRes.ok){const err=await rRes.text();throw new Error(`Supabase error: ${rRes.status} ${err}`);}
                          setSave("saved");setSaveError("");
                          setRestoreOk(true);
                          setTimeout(()=>{setExport(false);setRestoreText("");setRestoreOk(false);},1800);
                        }catch(e){
                          // Storage failed but data is live in memory — show warning not hard error
                          setSave("saved");
                          setRestoreOk(true);
                          setRestoreError(`Data restored in memory but storage write failed (${e.message.slice(0,60)}). Download a fresh backup now to be safe.`);
                          setTimeout(()=>{setExport(false);setRestoreText("");setRestoreOk(false);},4000);
                        }
                      })();
                    }catch(e){setRestoreError(e.message||"Invalid backup file");}
                  }} disabled={!restoreText.trim()} className="flex-1 bg-violet-600 hover:bg-violet-700 disabled:bg-gray-200 disabled:text-gray-400 text-white text-sm font-semibold py-2.5 rounded-xl transition-colors">Restore from backup</button>
                  <button onClick={()=>{setExport(false);setRestoreText("");setRestoreError("");}} className="px-5 bg-gray-100 text-gray-700 text-sm font-semibold py-2.5 rounded-xl hover:bg-gray-200">Cancel</button>
                </div>
              </div>
              :(()=>{
                const seenB=new Set();
                const dedupedLaunched=launched.filter(a=>{const k=`${a.adName?.trim()}||${a.week}`;if(seenB.has(k))return false;seenB.add(k);return true;});
                const backupPayload=JSON.stringify({_version:1,_exported:new Date().toISOString(),teamNames,weekData,winAds:winAds.map(({_parsed,_mWT,_mM,autoFlagged,attributions,...rest})=>({...rest,attributions})),launched:dedupedLaunched.map(({_parsed,_mWT,_mM,...rest})=>({id:rest.id,adName:rest.adName,week:rest.week,cpa:rest.cpa,spend:rest.spend})),criteria},null,2);
                const csvPayload=[["Team Member",...WEEKS,"Total"].join(","),...teamNames.map((n,mi)=>[n,...WEEKS.map((_,wi)=>mTotal(wi,mi)),Math.round(mGrand(mi)*100)/100].join(","))].join("\n");
                const activeText=exportTab==="backup"?backupPayload:csvPayload;
                return <div>
                  {exportTab==="backup"&&<div className="flex items-start gap-3 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 mb-3">
                    <span className="text-emerald-500 text-lg mt-0.5">💾</span>
                    <div><p className="text-sm font-semibold text-emerald-800">Full backup — save this every Monday</p><p className="text-xs text-emerald-600 mt-0.5">Includes all weekly input data, win ads, launched ads, hit rate data, and team config. Paste back in to fully restore.</p></div>
                  </div>}
                  {exportTab==="csv"&&<div className="flex items-start gap-3 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-3">
                    <span className="text-amber-500 text-lg mt-0.5">⚠️</span>
                    <div><p className="text-sm font-semibold text-amber-800">Points only — cannot be used to restore data</p><p className="text-xs text-amber-600 mt-0.5">Use the JSON backup if you want to preserve all your data. This CSV is for sharing scores only.</p></div>
                  </div>}
                  <textarea ref={exportRef} className="w-full h-52 text-xs border border-gray-200 rounded-xl p-3 font-mono bg-gray-50 focus:outline-none focus:ring-2 focus:ring-violet-400 resize-none" readOnly value={activeText} onClick={e=>e.target.select()}/>
                  <div className="flex gap-2 mt-3">
                    <button onClick={()=>{exportRef.current?.select();document.execCommand("copy");}} className="flex-1 bg-violet-600 text-white text-sm font-semibold py-2.5 rounded-xl hover:bg-violet-700">Copy to Clipboard</button>
                    <button onClick={()=>{const bl=new Blob([activeText],{type:exportTab==="backup"?"application/json":"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download=exportTab==="backup"?`simmer-tracker-backup-${new Date().toISOString().slice(0,10)}.json`:"simmer-tracker-points.csv";a.click();}} className="px-5 bg-gray-800 text-white text-sm font-semibold py-2.5 rounded-xl hover:bg-gray-700">⬇ Download file</button>
                    <button onClick={()=>setExport(false)} className="px-5 bg-gray-100 text-gray-700 text-sm font-semibold py-2.5 rounded-xl hover:bg-gray-200">Close</button>
                  </div>
                </div>;
              })()
            }
          </div>
        </div>
      </div>}

      <div className="flex border-b border-gray-100 overflow-x-auto bg-gray-50/50">
        {[["input","📥 Input"],["winners","🏆 Winners"],["output","🎬 Output"],["tracker","📊 Leaderboard"],["breakdown","📋 Breakdown"],["hitrate","🎯 Hit Rate"],["insights","💡 Insights"]].map(([id,label])=>
          <button key={id} onClick={()=>setTab(id)} className={`px-5 py-3.5 text-sm font-semibold border-b-2 whitespace-nowrap transition-all ${tab===id?"border-violet-600 text-violet-700 bg-white":"border-transparent text-gray-500 hover:text-gray-700 hover:bg-white/60"}`}>{label}</button>)}
      </div>

      <div className="p-5">
        {tab==="input"     &&<InputSheet/>}
        {tab==="winners"   &&<WeeklyWinnersSheet/>}
        {tab==="output"    &&<WeeklyOutputSheet/>}
        {tab==="tracker"   &&<TrackerSheet/>}
        {tab==="breakdown" &&<BreakdownSheet/>}
        {tab==="hitrate"   &&<HitRateSheet/>}
        {tab==="insights"  &&<InsightsSheet/>}
      </div>

      <div className="px-5 pb-5">
        <div className="bg-gray-50 rounded-xl p-3 text-xs text-gray-500 border border-gray-100">
          <span className="font-semibold text-gray-600">Points: </span>Scripting ×(0.25/0.5/1) · Editing ×(0.5/1/1.5) · Static ×0.25 · Video win: editor pts→editor + CS pts→CS · CS self-edit=both · Late −2 · Dial-in −1 &nbsp;·&nbsp;
          <span className="font-semibold text-gray-600">Hit rate: </span>Won ÷ launched concepts by month · Ticket or name dedup · One win per concept per month &nbsp;·&nbsp;
          <span className="font-semibold text-gray-600">Auto-win: </span>CPA ≤ £{criteria.maxCPA} + Spend ≥ £{criteria.minSpend}
        </div>
      </div>
    </div>
  </div>;
}

function WrappedApp(){
  return React.createElement(ErrorBoundary,null,React.createElement(App,null));
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(WrappedApp,null));

  </script>
</body>
</html>
