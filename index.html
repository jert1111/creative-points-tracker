class ErrorBoundary extends Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error)return(
      <div style={{padding:32,fontFamily:'monospace',background:'#fff1f2',minHeight:'100vh'}}>
        <h2 style={{color:'#be123c',marginBottom:16}}>⚠️ Runtime Error</h2>
        <pre style={{color:'#9f1239',whiteSpace:'pre-wrap',fontSize:13}}>{this.state.error?.message}</pre>

    );
    return this.props.children;
  }
}

const MONTH_NAME_TO_NUM = {
  Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,
  Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12
};

const VALID_YEARS = new Set(["23","24","25","26"]);

const monthYearFromToken = (token) => {
  if (!token) return null;
  const s = token.toLowerCase().replace("sept","sep");
  const letters = s.replace(/\d/g,"");
  const digits = s.replace(/\D/g,"");
  const m = MONTH_LABELS[letters];
  if (!m) return null;
  if (digits.length >= 2) {
    const yr = digits.slice(0,2);
    if (VALID_YEARS.has(yr)) return `${m} ${yr}`;
    return null;
  }
  return `${m} ??`;
};

const compareMonthYear = (a, b) => {
  const toNum = (s) => {
    if (!s) return 999999;
    const parts = s.split(" ");
    const mon = parts[0];
    const yr = parts[1];
    if (!yr || yr === "??") return 99999;
    const mNum = MONTH_NAME_TO_NUM[mon] || 0;
    const yNum = parseInt(yr, 10);
    if (isNaN(yNum)) return 99999;
    return yNum * 100 + mNum;
  };
  return toNum(a) - toNum(b);
};

const normaliseAsset = (raw) => {
  if (!raw) return null;
  const s = raw.toLowerCase().replace(/[\s\-_]/g,"");
  if (s.includes("static")||s==="gif"||s==="carousel") return "static";
  if (s==="20s"||s.includes("<20")||s.includes("sub20")||s==="video20s") return "<20s";
  if (s==="2040s"||s.includes("2040")||s==="video2040s") return "20-40s";
  if (s==="40s"||s==="+40s"||s.includes("+40")||s==="video40s") return "+40s";
  return null;
};

const MONTH_RE    = /^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\d{2}$/i;
const OLD_DATE_RE = /^(sept?|oct|nov|dec|jan|feb|mar|apr|may|jun|jul|aug)\d{2}$/i;
const OLD_SOLO_RE = /^(sept?|oct|nov|dec|jan|feb|mar|apr|may|jun|jul|aug)$/i;
const VERSION_RE  = /^V\d+\*?$/i;

const parseAdName = (name) => {
  if (!name||!name.trim()) return null;
  const cleaned = name.replace(/[^\x00-\x7F]/g,"").trim()
    .replace(/[\s\-]*copy[\s\d]*/gi,"")
    .replace(/,/g,"")
    .replace(/\s*_\s*/g,"_")
    .replace(/\s+(V\d+)/gi,"_$1")
    .replace(/\s+/g,"");
  const parts = cleaned.split("_").map(s=>s.trim());
  if (parts.length<3) return null;
  const p = {_raw:name,convention:null};
  const vIdx    = parts.findIndex(x=>VERSION_RE.test(x));
  const newMIdx = parts.findIndex(x=>MONTH_RE.test(x));
  const oldDIdx = newMIdx<0?parts.findIndex(x=>OLD_DATE_RE.test(x)||OLD_SOLO_RE.test(x)):-1;
  const exEd = r=>{const u=(r||"").toUpperCase().replace(/\*/g,"").trim();return INITIALS_MAP[u]?{editor:u,editorName:INITIALS_MAP[u]}:{};};
  const exCS = r=>{const u=(r||"").toUpperCase().replace(/\*/g,"").trim();return INITIALS_MAP[u]?{cs:u,csName:INITIALS_MAP[u]}:{};};
  const pickCS = (idx) => { const a=exCS(parts[idx+1]); const b=exCS(parts[idx-1]); return Object.keys(a).length?a:b; };
  if (newMIdx>=0) {
    p.convention="new";
    [p.concept,p.ticket,p.briefType,p.actor,p.persona,p.funnel,p.solutions,p.medium,p.offer]=parts;
    p.monthToken=parts[newMIdx];
    const newSlot1=parts[newMIdx+1]||"";
    const newSlot2=parts[newMIdx+2]||"";
    const newSlotLower=newSlot1.toLowerCase();
    if(newSlotLower==="video"||newSlotLower==="image"||newSlotLower==="graphic"){
      p.assetType=normaliseAsset(newSlot2)||normaliseAsset(newSlot1)||newSlot1||null;
      if(p.assetType!=="static") Object.assign(p,exEd(parts[newMIdx+3]));
    } else {
      p.assetType=normaliseAsset(newSlot1)||newSlot1||null;
      if(p.assetType!=="static") Object.assign(p,exEd(parts[newMIdx+2]));
    }
    if(vIdx>=0){p.version=parts[vIdx].toUpperCase();Object.assign(p,pickCS(vIdx));}
  } else if (oldDIdx>=0) {
    p.convention="old";p.concept=parts[0];p.ticket=parts[1];p.product=parts[2];
    p.persona=parts[3];p.funnel=parts[4];p.solutions=parts[5];p.medium=parts[6];
    p.monthToken=parts[oldDIdx];
    const oldSlot1=parts[oldDIdx+1]||"";
    const oldSlot2=parts[oldDIdx+2]||"";
    const oldSlotLower=oldSlot1.toLowerCase();
    if(oldSlotLower==="video"||oldSlotLower==="image"||oldSlotLower==="graphic"){
      p.assetType=normaliseAsset(oldSlot2)||normaliseAsset(oldSlot1)||oldSlot1||null;
      if(p.assetType!=="static") Object.assign(p,exEd(parts[oldDIdx+3]));
    } else {
      p.assetType=normaliseAsset(oldSlot1)||oldSlot1||null;
      if(p.assetType!=="static") Object.assign(p,exEd(parts[oldDIdx+2]));
    }
    if(vIdx>=0){p.version=parts[vIdx].toUpperCase();Object.assign(p,pickCS(vIdx));}
  } else {
    p.convention="unknown";p.concept=parts[0];p.ticket=parts[1];
    if(vIdx>=0){p.version=parts[vIdx].toUpperCase();Object.assign(p,exCS(parts[vIdx+1]));}
    for(let i=0;i<parts.length;i++){const u=parts[i].toUpperCase();if(EDITORS.includes(u)&&INITIALS_MAP[u]&&!p.editor){p.editor=u;p.editorName=INITIALS_MAP[u];}}
  }
  const asset=p.assetType,ed=p.editor;
  const isSelfEdit=p.cs&&p.editor&&p.cs===p.editor;
  if(isSelfEdit) p.csSelfEdit=true;
  const isEditorWin=(ed&&EDITORS.includes(ed))||isSelfEdit;
  if(asset==="static") p.inferredWinType="Static";
  else if(asset==="<20s") p.inferredWinType=isEditorWin?"Editor <20s":"CS <20s";
  else if(asset==="20-40s"||asset==="+40s") p.inferredWinType=isEditorWin?"Editor 20-40s":"CS 20-40s";
  p.monthYear=monthYearFromToken(p.monthToken);
  return p;
};

const conceptKey = (parsed) => {
  if(!parsed) return null;
  if(parsed.ticket&&/^\d+$/.test(parsed.ticket.trim())) return "t:"+parsed.ticket.trim();
  if(parsed.concept&&parsed.concept.trim()) return "c:"+parsed.concept.trim().toLowerCase();
  return null;
};

const getWinAttributions = (parsed,winType,teamNames) => {
  if(!parsed||parsed.convention==="unknown") return [];
  const find=init=>init?(teamNames.find(n=>n.includes("("+init+")"))||INITIALS_MAP[init]||null):null;
  const edM=find(parsed.editor),csM=find(parsed.cs);
  if(winType==="Static") return [{member:csM||edM||teamNames[0],winType:"Static",pts:WIN_PTS["Static"]}];
  if(winType==="Editor <20s"||winType==="Editor 20-40s"){
    const csWT=winType==="Editor <20s"?"CS <20s":"CS 20-40s";
    const res=[];
    if(edM) res.push({member:edM,winType,pts:WIN_PTS[winType]});
    if(csM){if(parsed.csSelfEdit||csM===edM){if(res.length)res[0].pts+=WIN_PTS[csWT];else res.push({member:csM,winType:csWT,pts:WIN_PTS[csWT]});}else res.push({member:csM,winType:csWT,pts:WIN_PTS[csWT]});}
    return res;
  }
  if(winType==="CS <20s"||winType==="CS 20-40s") return [{member:csM||edM||teamNames[0],winType,pts:WIN_PTS[winType]}];
  return [];
};

const calcBreakdown = (d,winPts) => {
  if(d.sick||d.leave) return {scripting:0,editing:0,staticPts:0,winning:0,modifiers:0,shootBonus:0,total:0};
  const scripting=Math.round((0.25*d.s_sub20+0.5*d.s_2040+d.s_40p)*100)/100;
  const editing=Math.round((0.5*d.v_sub20+d.v_2040+1.5*d.v_40p)*100)/100;
  const staticPts=Math.round(0.25*d.static_count*100)/100;
  const winning=Math.round((winPts||0)*100)/100;
  const modifiers=(d.late?-2:0)+(d.dialin?-1:0);
  const base=scripting+editing+staticPts+winning+modifiers;
  const shoots=Math.min(d.shoot_days,4);
  const shootBonus=shoots>0?Math.round(base/(5-shoots)*shoots*100)/100:0;
  return{scripting,editing,staticPts,winning,modifiers,shootBonus,total:Math.round((base+shootBonus)*100)/100};
};

const parsePerfRow = line => {
  const sep=line.includes("\t")?"\t":",";
  const p=line.split(sep).map(s=>s.trim().replace(/^"|"$/g,""));
  if(p.length<2||!p[0]) return null;
  return{adName:p[0],spend:parseFloat(p[1]?.replace(/[£$,]/g,""))||0,purchases:parseFloat(p[2])||0,cpa:parseFloat(p[3]?.replace(/[£$,]/g,""))||0};
};

const calcPersonHitRate = (launchedAds,winAds,personName) => {
  const mine=launchedAds.filter(a=>a._parsed&&(a._parsed.editorName===personName||a._parsed.csName===personName));
  const byMonth={};
  mine.forEach(a=>{
    const month=a._parsed.monthYear||"Unknown";
    const ck=conceptKey(a._parsed)||"n:"+a.adName.trim().toLowerCase();
    if(!byMonth[month])byMonth[month]={launched:new Set(),won:new Set()};
    byMonth[month].launched.add(ck);
  });
  Object.keys(byMonth).forEach(month=>{
    byMonth[month].launched.forEach(ck=>{
      const won=winAds.filter(w=>!w.blocked).some(w=>{
        const wCk=conceptKey(w._parsed)||"n:"+w.adName.trim().toLowerCase();
        return wCk===ck&&(w._parsed?.monthYear||"Unknown")===month;
      });
      if(won) byMonth[month].won.add(ck);
    });
  });
  const months=Object.keys(byMonth)
    .filter(m=>m!=="Unknown"&&m!==null&&!m.includes("??")&&compareMonthYear(m,"Jan 26")>=0)
    .sort(compareMonthYear);
  const rows=months.map(m=>({month:m,launched:byMonth[m].launched.size,won:byMonth[m].won.size,rate:byMonth[m].launched.size>0?byMonth[m].won.size/byMonth[m].launched.size:0}));
  const tL=rows.reduce((s,r)=>s+r.launched,0),tW=rows.reduce((s,r)=>s+r.won,0);
  return{rows,totalLaunched:tL,totalWon:tW,rate:tL>0?tW/tL:0};
};

const calcTeamHitRate = (launchedAds,winAds) => {
  const byMonth={};
  launchedAds.forEach(a=>{
    const month=a._parsed?.monthYear||"Unknown";
    const ck=conceptKey(a._parsed)||"n:"+a.adName.trim().toLowerCase();
    if(!byMonth[month])byMonth[month]={launched:new Set(),won:new Set()};
    byMonth[month].launched.add(ck);
  });
  Object.keys(byMonth).forEach(month=>{
    byMonth[month].launched.forEach(ck=>{
      const won=winAds.filter(w=>!w.blocked).some(w=>{
        const wCk=conceptKey(w._parsed)||"n:"+w.adName.trim().toLowerCase();
        return wCk===ck&&(w._parsed?.monthYear||"Unknown")===month;
      });
      if(won) byMonth[month].won.add(ck);
    });
  });
  return Object.keys(byMonth)
    .filter(m=>m!=="Unknown"&&m!==null&&!m.includes("??")&&compareMonthYear(m,"Jan 26")>=0)
    .sort(compareMonthYear)
    .map(m=>({month:m,launched:byMonth[m].launched.size,won:byMonth[m].won.size,rate:byMonth[m].launched.size>0?byMonth[m].won.size/byMonth[m].launched.size:0}));
};

const buildRanking=(ads,keyFn,weighted)=>{
  const map={};
  ads.filter(a=>!a.blocked&&a._parsed).forEach(a=>{
    const key=keyFn(a._parsed);
    if(!key||["null","undefined","x","X","","None","none"].includes(String(key)))return;
    if(!map[key])map[key]={count:0,pts:0};
    map[key].count++;map[key].pts+=WIN_PTS[a.winType]||0;
  });
  return Object.entries(map).map(([k,v])=>({label:k,...v})).sort((a,b)=>weighted?b.pts-a.pts:b.count-a.count);
};

const NumInput=({value,onChange,disabled})=>{
  const ref=useRef(null);
  useEffect(()=>{if(ref.current&&document.activeElement!==ref.current)ref.current.value=value===0?"":value;},[value]);
  return <input ref={ref} type="number" min="0" disabled={disabled} defaultValue={value===0?"":value} placeholder="0"
    className="w-14 border rounded px-1 py-0.5 text-center text-sm disabled:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400"
    onFocus={e=>e.target.select()}
    onBlur={e=>onChange(e.target.value===""?0:Math.max(0,+e.target.value))}
    onKeyDown={e=>{if(e.key==="Enter"){e.target.blur();const all=Array.from(document.querySelectorAll("input[type=number]:not(:disabled)"));const i=all.indexOf(e.target);if(i>=0&&all[i+1])all[i+1].focus();}}}/>;
};

const RankBar=({label,count,pts,max,weighted,rank})=>{
  const val=weighted?pts:count,pct=max>0?Math.round(val/max*100):0;
  const medal=rank===0?"🥇":rank===1?"🥈":rank===2?"🥉":null;
  return <div className="mb-2">
    <div className="flex justify-between items-center mb-0.5"><span className="text-sm text-gray-700">{medal&&<span className="mr-1">{medal}</span>}{label}</span><span className="text-xs text-gray-500">{weighted?`${pts}pts`:`${count}w`}</span></div>
    <div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-blue-500 rounded-full" style={{width:`${pct}%`}}/></div>
  </div>;
};

  const max=weighted?Math.max(...data.map(d=>d.pts)):Math.max(...data.map(d=>d.count));
  return <div className="bg-white border rounded-xl p-4"><p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">{title}</p>{data.slice(0,6).map((d,i)=><RankBar key={d.label} {...d} max={max} weighted={weighted} rank={i}/>)}</div>;
};

function App(){
  const [tab,setTab]=useState("input");
  const [selWeek,setSelWeek]=useState(0);
  const [teamNames,setTeamNames]=useState(DEFAULT_NAMES);
  const [editName,setEditName]=useState(null);
  const [weekData,setWeekData]=useState(SEED_WEEKS);
  const [winAds,setWinAds]=useState(SEED_WINS);
  const [launched,setLaunched]=useState([]);
  const [criteria,setCriteria]=useState(DEFAULT_WIN_CRITERIA);
  const [loading,setLoading]=useState(true);
  const [saveStatus,setSave]=useState("saved");
  const [saveError,setSaveError]=useState("");
  const [showExport,setExport]=useState(false);
  const [exportTab,setExportTab]=useState("backup");
  const [restoreText,setRestoreText]=useState("");
  const [restoreError,setRestoreError]=useState("");
  const [restoreOk,setRestoreOk]=useState(false);
  const exportRef=useRef(null);
  const [impWeek,setImpWeek]=useState(WEEKS.filter(Boolean).slice(-1)[0]||WEEKS[0]);
  const [impText,setImpText]=useState("");
  const [impPreview,setImpPrev]=useState(null);
  const [impStep,setImpStep]=useState("paste");
  const [undoStack,setUndoStack]=useState([]);

  const TEAM_SIZE = DEFAULT_NAMES.length; // 12

  useEffect(()=>{
    (async()=>{
      try{
                const {payload:p, launched:launchRaw}=await supabaseGet();
        if(p){
          if(p.teamNames)setTeamNames(p.teamNames);
          if(p.weekData){const decompressed=decompressWeekData(p.weekData);setWeekData(decompressed.map(w=>w.length<TEAM_SIZE?[...w,...Array(TEAM_SIZE-w.length).fill(null).map(emptyInput)]:w).concat(Array(Math.max(0,13-decompressed.length)).fill(null).map(()=>Array(TEAM_SIZE).fill(null).map(emptyInput))));}
          const rawWins=p.winAds||[];
          if(rawWins.length)setWinAds(rawWins.map(a=>{const parsed=parseAdName(a.adName);const attrs=parsed&&parsed.convention!=="unknown"?getWinAttributions(parsed,a.winType,p.teamNames||DEFAULT_NAMES):a.attributions||[];const my=a.monthYear||parsed?.monthYear||null;return{...a,_parsed:{...parsed,monthYear:my},attributions:attrs};}));
          if(p.criteria)setCriteria(p.criteria);
        }
        if(launchRaw&&Array.isArray(launchRaw)){
          const seen=new Set();
          const deduped=launchRaw.filter(a=>{const k=`${a.adName?.trim()}||${a.week}`;if(seen.has(k))return false;seen.add(k);return true;});
          setLaunched(deduped.map(a=>({...a,_parsed:parseAdName(a.adName)})));
        }
      }catch(e){console.error("Load error",e);}
      setLoading(false);
    })();
  },[]);

  const saveTimerRef=useRef(null);
  const pendingSaveRef=useRef(null);

  const save=useCallback((names,data,wins,launch,crit,throttle=false)=>{
    pendingSaveRef.current={names,data,wins,launch,crit,throttle};
    setSave("saving");
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(async()=>{
      const {names,data,wins,launch,crit,throttle}=pendingSaveRef.current;
      try{
        const winsClean=wins.map(({_parsed,_mWT,_mM,autoFlagged,attributions,...rest})=>({
          ...rest,
          attributions,
          monthYear:_parsed?.monthYear||rest.monthYear||null,
        }));
        // Compress launched: store only numeric id index + cpa + spend, adName decoded on load
        const launchClean=launch.map(({_parsed,_mWT,_mM,...rest})=>({
          id:rest.id,adName:rest.adName,week:rest.week,cpa:rest.cpa,spend:rest.spend
        }));
        // Single write per logical group — avoid rate limiting from many sequential writes
        const payload1=JSON.stringify({teamNames:names,weekData:compressWeekData(data),winAds:winsClean,criteria:crit});
        const payload2=JSON.stringify(launchClean);
        const kb1=Math.round(payload1.length/1024), kb2=Math.round(payload2.length/1024);
        console.log(`Save — main:${kb1}KB launched:${kb2}KB | ads:${launchClean.length}`);
        if(payload1.length>4500000) throw new Error(`Main payload too large: ${kb1}KB`);
        if(payload2.length>4500000) throw new Error(`Launched payload too large: ${kb2}KB`);
        const saveRes=await fetch(`${SUPABASE_URL}/rest/v1/tracker_data`,{
          method:"POST",
          headers:{
            "apikey":SUPABASE_KEY,
            "Authorization":"Bearer "+SUPABASE_KEY,
            "Content-Type":"application/json",
            "Prefer":"resolution=merge-duplicates"
          },
          body:JSON.stringify({id:"main",payload:JSON.parse(payload1),launched:JSON.parse(payload2),updated_at:new Date().toISOString()})
        });
        if(!saveRes.ok){const err=await saveRes.text();throw new Error(`Supabase error: ${saveRes.status} ${err}`);}
        setSave("saved");setSaveError("");
      }catch(e){
        console.error("Save error",e);
        const msg=e?.message||String(e);
        // Append size report to any error so we can diagnose
        let report="";
        try{
          const wc=wins.map(({_parsed,_mWT,_mM,autoFlagged,attributions,...rest})=>({...rest,attributions}));
          const lc=launch.map(({_parsed,_mWT,_mM,...rest})=>({id:rest.id,adName:rest.adName,week:rest.week,cpa:rest.cpa,spend:rest.spend}));
          const mp=JSON.stringify({teamNames:names,weekData:compressWeekData(data),winAds:wc,criteria:crit});
          const lp=JSON.stringify(lc);
          report=` | Sizes — main:${Math.round(mp.length/1024)}KB launched:${Math.round(lp.length/1024)}KB (${lc.length} ads)`;
        }catch(_){}
        setSave("error");setSaveError(msg+report);
      }
    },800);
  },[]);

  const pushUndo=useCallback((label,snapWeekData,snapWinAds)=>{
    setUndoStack(s=>[{label,weekData:snapWeekData,winAds:snapWinAds,ts:Date.now()},...s].slice(0,5));
  },[]);

  const handleUndo=useCallback(()=>{
    setUndoStack(s=>{
      if(!s.length)return s;
      const [top,...rest]=s;
      setTimeout(()=>{
        setWeekData(top.weekData);
        setWinAds(top.winAds);
        save(teamNames,top.weekData,top.winAds,launched,criteria);
      },0);
      return rest;
    });
  },[teamNames,launched,criteria,save]);

  const getWinPts=(wi,mi)=>{
    const name=teamNames[mi],week=WEEKS[wi];
    return Math.round(winAds.filter(a=>a.week===week&&!a.blocked).reduce((sum,a)=>{
      const attrs=a.attributions||[];
      const mine=attrs.filter(at=>at.member===name).reduce((s,at)=>s+at.pts,0);
      if(!attrs.length&&a.member===name)return sum+(WIN_PTS[a.winType]||0);
      return sum+mine;
    },0)*100)/100;
  };

  const getBD=(wi,mi)=>calcBreakdown(weekData[wi][mi]||emptyInput(),getWinPts(wi,mi));
  const mTotal=(wi,mi)=>getBD(wi,mi).total;
  const mGrand=mi=>WEEKS.reduce((s,_,wi)=>s+mTotal(wi,mi),0);
  const wTotals=wi=>teamNames.map((_,mi)=>mTotal(wi,mi));
  const meetsWin=(row,c)=>row.spend>=c.minSpend&&row.cpa>0&&row.cpa<=c.maxCPA;

  const handleParse=()=>{
    const lines=impText.split("\n").map(l=>l.trim()).filter(Boolean);
    const start=isNaN(parseFloat(lines[0]?.split(/[\t,]/)[1]?.replace(/[£$,]/g,"")))?1:0;
    const rows=lines.slice(start).map(parsePerfRow).filter(Boolean);
    const existing=new Set(launched.map(a=>a.adName.trim()));
    const seen=new Set(),newRows=[],dupRows=[];
    rows.forEach(r=>{
      const k=r.adName.trim();
      if(existing.has(k)||seen.has(k))dupRows.push(r);else{seen.add(k);newRows.push(r);}
    });
    setImpPrev({newRows,dupRows});setImpStep("preview");
  };

  const handleConfirm=()=>{
    if(!impPreview)return;
    pushUndo("Hit rate import",weekData,winAds,launched);
    // Deduplicate: build a set of existing adName+week combos to avoid double-importing
    const existingKeys=new Set(launched.map(a=>`${a.adName.trim()}||${a.week}`));
    const newL=[...launched],newW=[...winAds];let autoCount=0;
    impPreview.newRows.forEach(row=>{
      const parsed=parseAdName(row.adName);
      const key=`${row.adName.trim()}||${impWeek}`;
      if(existingKeys.has(key)){
        // Update existing entry's cpa/spend rather than duplicating
        const existing=newL.find(a=>a.adName.trim()===row.adName.trim()&&a.week===impWeek);
        if(existing){existing.cpa=row.cpa;existing.spend=row.spend;}
        return;
      }
      existingKeys.add(key);
      newL.push({id:Date.now()+Math.random(),adName:row.adName,week:impWeek,spend:row.spend,purchases:row.purchases,cpa:row.cpa,_parsed:parsed});
      if(meetsWin(row,criteria)){
        const ck=parsed?conceptKey(parsed):null;
        const month=parsed?.monthYear||null;
        const alreadyWon=newW.some(w=>{
          if(w.blocked)return false;
          const wCk=conceptKey(w._parsed),wMonth=w._parsed?.monthYear||null;
          if(ck&&wCk&&month&&wMonth)return ck===wCk&&month===wMonth;
          return w.adName.trim()===row.adName.trim();
        });
        if(!alreadyWon){
          const winType=parsed?.inferredWinType||"Static";
          const attrs=parsed&&parsed.convention!=="unknown"?getWinAttributions(parsed,winType,teamNames):[];
          newW.push({id:Date.now()+Math.random(),adName:row.adName,member:attrs[0]?.member||teamNames[0],winType,attributions:attrs,week:impWeek,blocked:false,autoFlagged:true,cpa:row.cpa,spend:row.spend,_parsed:parsed});
          autoCount++;
        }
      }
    });
    setLaunched(newL);setWinAds(newW);
    save(teamNames,weekData,newW,newL,criteria);
    setImpText("");setImpPrev({...impPreview,autoCount});setImpStep("done");
    setTimeout(()=>setImpStep("paste"),3500);
  };

  const updateField=(mi,f,v)=>setWeekData(prev=>{const next=prev.map(w=>w.map(m=>({...m})));next[selWeek][mi][f]=v;save(teamNames,next,winAds,launched,criteria);return next;});
  const updateName=(mi,v)=>setTeamNames(prev=>{const next=prev.map((n,i)=>i===mi?v:n);save(next,weekData,winAds,launched,criteria);return next;});
  const updateWin=(id,field,value)=>{
    const next=winAds.map(a=>{
      if(a.id!==id)return a;
      const u={...a,[field]:value};
      if(field==="adName"){const p=parseAdName(value);u._parsed=p;if(p&&!u._mWT)u.winType=p.inferredWinType||WIN_TYPES[0];const attrs=p?getWinAttributions(p,u.winType,teamNames):[];u.attributions=attrs;if(attrs.length&&!u._mM)u.member=attrs[0].member;}
      if(field==="winType"){u._mWT=true;const attrs=u._parsed?getWinAttributions(u._parsed,value,teamNames):[];u.attributions=attrs;if(attrs.length&&!u._mM)u.member=attrs[0].member;}
      if(field==="member")u._mM=true;
      return u;
    });
    setWinAds(next);save(teamNames,weekData,next,launched,criteria);
  };
  const removeWin=id=>{const n=winAds.filter(a=>a.id!==id);setWinAds(n);save(teamNames,weekData,n,launched,criteria);};

  if(loading)return <div className="min-h-screen bg-gray-100 flex items-center justify-center text-gray-400 text-sm">Loading...</div>;

  // Sheet 1: Weekly Input
  const InputSheet=()=>{
    const d=weekData[selWeek];
    const editors=teamNames.map((n,i)=>({name:n,mi:i})).filter(({name})=>!CS_NAMES.includes(name));
    const strats=teamNames.map((n,i)=>({name:n,mi:i})).filter(({name})=>CS_NAMES.includes(name));
    const MemberRow=({name,mi,stripe})=>{
      const row=d[mi]||emptyInput(),pts=mTotal(selWeek,mi),wp=getWinPts(selWeek,mi);
      const isZ=row.sick||row.leave;
      const bg=stripe?"bg-gray-50":"bg-white";
      return <tr className={bg}>
        <td className={`px-3 py-2.5 font-medium sticky left-0 z-10 ${bg}`}>
          <div className="flex items-center gap-2">
            {editName===mi
              ?<input autoFocus className="border rounded px-1 w-full text-sm" value={name} onChange={e=>updateName(mi,e.target.value)} onBlur={()=>setEditName(null)} onKeyDown={e=>e.key==="Enter"&&setEditName(null)}/>
              :<span className="cursor-pointer hover:text-violet-600 transition-colors text-gray-800" onClick={()=>setEditName(mi)}>{name}</span>}
          </div>
        </td>
        {["s_sub20","s_2040","s_40p"].map((f,i)=><td key={f} className={`px-1 py-1.5 ${i===0?"border-l border-gray-100":""}`}><NumInput value={row[f]} disabled={isZ} onChange={v=>updateField(mi,f,v)}/></td>)}
        {["v_sub20","v_2040","v_40p"].map((f,i)=><td key={f} className={`px-1 py-1.5 ${i===0?"border-l border-gray-100":""}`}><NumInput value={row[f]} disabled={isZ} onChange={v=>updateField(mi,f,v)}/></td>)}
        <td className="px-1 py-1.5 border-l border-gray-100"><NumInput value={row.static_count} disabled={isZ} onChange={v=>updateField(mi,"static_count",v)}/></td>
        <td className="px-2 py-1.5 text-center border-l border-gray-100"><input type="checkbox" className="accent-violet-500" checked={row.late} onChange={e=>updateField(mi,"late",e.target.checked)}/></td>
        <td className="px-2 py-1.5 text-center"><input type="checkbox" className="accent-violet-500" checked={row.dialin} onChange={e=>updateField(mi,"dialin",e.target.checked)}/></td>
        <td className="px-2 py-1.5 text-center">
          <select className="border border-gray-200 rounded-md text-xs px-1.5 py-0.5 bg-white" value={row.sick?"sick":row.leave?"leave":"none"} onChange={e=>setWeekData(prev=>{const next=prev.map(w=>w.map(m=>({...m})));next[selWeek][mi].sick=e.target.value==="sick";next[selWeek][mi].leave=e.target.value==="leave";save(teamNames,next,winAds,launched,criteria);return next;})}>
            <option value="none">—</option><option value="sick">Sick</option><option value="leave">Leave</option>
          </select>
        </td>
        <td className="px-1 py-1.5"><NumInput value={row.shoot_days} disabled={isZ} onChange={v=>updateField(mi,"shoot_days",Math.min(4,v))}/></td>
        <td className="px-3 py-2.5 text-center border-l border-gray-100 font-semibold text-amber-500 text-sm">{wp>0?`+${wp}`:<span className="text-gray-200">—</span>}</td>
        <td className="px-3 py-2.5 text-center border-l border-gray-100"><span className={`font-bold text-sm px-2 py-0.5 rounded-full ${pts>0?"bg-emerald-50 text-emerald-700":pts<0?"bg-red-50 text-red-600":"text-gray-400"}`}>{pts}</span></td>
      </tr>;
    };
    const SectionDivider=({label,color})=><tr><td colSpan={14} className={`px-3 py-1.5 text-xs font-bold uppercase tracking-widest ${color}`}>{label}</td></tr>;
    return <div>
      <div className="flex items-center gap-3 mb-5 flex-wrap">
        <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2">
          <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Week</span>
          <select className="bg-transparent text-sm font-semibold text-gray-800 focus:outline-none cursor-pointer" value={selWeek} onChange={e=>setSelWeek(+e.target.value)}>
            {WEEKS.map((w,i)=><option key={i} value={i}>{w}</option>)}
          </select>
        </div>
      </div>
      <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
        <table className="w-full text-sm border-collapse">
          <thead>
            <tr className="bg-gray-900 text-white">
              <th className="px-3 py-2.5 text-left sticky left-0 bg-gray-900 z-10 min-w-[150px]">Member</th>
              <th colSpan={3} className="px-3 py-2.5 text-center border-l border-gray-700 text-violet-300">✍️ Scripting</th>
              <th colSpan={3} className="px-3 py-2.5 text-center border-l border-gray-700 text-blue-300">✂️ Editing</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-pink-300">🖼 Statics</th>
              <th colSpan={4} className="px-3 py-2.5 text-center border-l border-gray-700 text-gray-400">Modifiers</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-amber-300">🏆 Wins</th>
              <th className="px-3 py-2.5 text-center border-l border-gray-700 text-emerald-300">Total</th>
            </tr>
            <tr className="bg-gray-800 text-gray-400 text-xs">
              <th className="px-3 py-1.5 sticky left-0 bg-gray-800 z-10"></th>
              <th className="px-2 py-1.5 border-l border-gray-700 font-normal">&lt;20s ×0.25</th>
              <th className="px-2 py-1.5 font-normal">20-40s ×0.5</th>
              <th className="px-2 py-1.5 font-normal">+40s ×1</th>
              <th className="px-2 py-1.5 border-l border-gray-700 font-normal">&lt;20s ×0.5</th>
              <th className="px-2 py-1.5 font-normal">20-40s ×1</th>
              <th className="px-2 py-1.5 font-normal">+40s ×1.5</th>
              <th className="px-2 py-1.5 border-l border-gray-700 font-normal">×0.25 each</th>
              <th className="px-2 py-1.5 border-l border-gray-700 font-normal">Late −2</th>
              <th className="px-2 py-1.5 font-normal">Dial-in −1</th>
              <th className="px-2 py-1.5 font-normal">Sick/Leave</th>
              <th className="px-2 py-1.5 font-normal">Shoot Days</th>
              <th className="px-2 py-1.5 border-l border-gray-700 font-normal text-amber-400">Auto</th>
              <th className="px-2 py-1.5 border-l border-gray-700 font-normal text-emerald-400">Pts</th>
            </tr>
          </thead>
          <tbody>
            <SectionDivider label="✂️ Editors" color="bg-blue-50 text-blue-600 border-b border-blue-100"/>
            {editors.map(({name,mi},i)=><MemberRow key={mi} name={name} mi={mi} stripe={i%2===1}/>)}
            <SectionDivider label="✍️ Creative Strategists" color="bg-violet-50 text-violet-600 border-y border-violet-100"/>
            {strats.map(({name,mi},i)=><MemberRow key={mi} name={name} mi={mi} stripe={i%2===1}/>)}
          </tbody>
        </table>
      </div>
      <p className="text-xs text-gray-400 mt-3 italic">Win points auto-detected via performance import. Manual modifier entry only.</p>
    </div>;
  };

  // Sheet 2: Leaderboard
  const TrackerSheet=()=>{
    const editors=teamNames.filter(n=>!CS_NAMES.includes(n));
    const cs=teamNames.filter(n=>CS_NAMES.includes(n));
    const weekMonths=WEEKS.map(w=>{const m=w.match(/[A-Za-z]+$/);return m?m[0]:null;});
    const allMonths=[...new Set(weekMonths.filter(Boolean))];
    const [monthFilter,setMonthFilter]=useState("All");
    const visibleWks=monthFilter==="All"?WEEKS.map((_,i)=>i):WEEKS.map((_,i)=>i).filter(i=>weekMonths[i]===monthFilter);
    const mTotalF=(wi,mi)=>mTotal(wi,mi);
    const mGrandF=mi=>visibleWks.reduce((s,wi)=>s+mTotalF(wi,mi),0);
    const wTotalsF=wi=>teamNames.map((_,mi)=>mTotalF(wi,mi));
    const MemberRows=({names,bg,label})=>{
      const sorted=names.map(n=>({n,mi:teamNames.indexOf(n),total:mGrandF(teamNames.indexOf(n))})).sort((a,b)=>b.total-a.total);
      return <>
        <tr><td colSpan={visibleWks.length+3} className={`px-3 py-2 text-xs font-bold uppercase tracking-wider ${bg}`}>{label}</td></tr>
        {sorted.map(({n,mi},rank)=><tr key={mi} className={rank%2===0?"bg-white":"bg-gray-50"}>
          <td className={`px-3 py-2 font-medium sticky left-0 z-10 ${rank%2===0?"bg-white":"bg-gray-50"}`}>{n}</td>
          {visibleWks.map((wi)=>{const pts=mTotalF(wi,mi),top=pts===Math.max(...wTotalsF(wi))&&pts>0;return <td key={wi} className={`px-3 py-2 text-center text-sm ${top?"bg-yellow-50 font-bold text-yellow-700":""} ${pts<0?"text-red-500":""}`}>{pts!==0?pts:<span className="text-gray-300">—</span>}</td>;})}
          <td className="px-3 py-2 text-center font-bold text-blue-700 bg-blue-50">{Math.round(mGrandF(mi)*100)/100}</td>
          <td className="px-3 py-2 text-center font-bold">{rank===0?"🥇":rank===1?"🥈":rank===2?"🥉":`#${rank+1}`}</td>
        </tr>)}
        <tr className="bg-gray-100 text-gray-600 text-xs font-semibold">
          <td className="px-3 py-1.5 sticky left-0 bg-gray-100 z-10 italic">{label} Total</td>
          {visibleWks.map((wi)=><td key={wi} className="px-3 py-1.5 text-center">{Math.round(names.reduce((s,n)=>s+mTotalF(wi,teamNames.indexOf(n)),0)*100)/100}</td>)}
          <td className="px-3 py-1.5 text-center text-blue-700 font-bold bg-blue-50">{Math.round(names.reduce((s,n)=>s+mGrandF(teamNames.indexOf(n)),0)*100)/100}</td>
          <td></td>
        </tr>
      </>;
    };
    return <div>
      <div className="flex items-center gap-2 mb-5 flex-wrap">
        {["All",...allMonths].map(m=>(
          <button key={m} onClick={()=>setMonthFilter(m)}
            className={`px-4 py-1.5 rounded-full text-sm font-semibold border transition-colors ${monthFilter===m?"bg-gray-800 text-white border-gray-800":"bg-white text-gray-600 border-gray-200 hover:border-gray-400"}`}>
            {m}
          </button>
        ))}
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm border-collapse">
          <thead><tr className="bg-gray-800 text-white"><th className="px-3 py-2 text-left sticky left-0 bg-gray-800 z-10 min-w-[130px]">Member</th>{WEEKS.map((w,i)=><th key={i} className="px-3 py-2 text-center min-w-[88px] text-xs">{w}</th>)}<th className="px-3 py-2 text-center bg-gray-700 min-w-[70px]">Total</th><th className="px-3 py-2 text-center bg-gray-700 min-w-[55px]">Rank</th></tr></thead>
          <tbody><MemberRows names={editors} bg="bg-blue-50 text-blue-800 border-t-2 border-blue-200" label="✂️ Editors"/><MemberRows names={cs} bg="bg-purple-50 text-purple-800 border-t-2 border-purple-200" label="🎯 Creative Strategists"/></tbody>
          <tfoot><tr className="bg-gray-800 text-white font-semibold"><td className="px-3 py-2 sticky left-0 bg-gray-800 z-10">Team Total</td>{WEEKS.map((_,wi)=><td key={wi} className="px-3 py-2 text-center">{Math.round(wTotals(wi).reduce((a,b)=>a+b,0)*100)/100}</td>)}<td className="px-3 py-2 text-center bg-gray-700">{Math.round(teamNames.reduce((_,__,mi)=>_+mGrand(mi),0)*100)/100}</td><td></td></tr></tfoot>
        </table>
      </div>
      <div className="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
